name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hasumane_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hasumane_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test-access-secret-change-me
      JWT_REFRESH_SECRET: test-refresh-secret-change-me
      COOKIE_SECRET: test-cookie-secret-change-me
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run prisma:generate --workspace=backend
      - run: npm run lint --workspace=backend
      - run: npm run test:cov --workspace=backend
      - run: npm run test:e2e --workspace=backend
      - run: npm run build --workspace=backend
