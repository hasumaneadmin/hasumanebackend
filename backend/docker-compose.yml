version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    expose: ["5000"]
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/hasumane}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - COOKIE_SECRET=${COOKIE_SECRET}
    depends_on:
      - postgres
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hasumane-api.rule=Host(`api.hasumane.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.hasumane-api.entrypoints=websecure"
      - "traefik.http.routers.hasumane-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.hasumane-api.loadbalancer.server.port=5000"
    networks:
      - dokploy-network

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=hasumane
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  postgres-data:
