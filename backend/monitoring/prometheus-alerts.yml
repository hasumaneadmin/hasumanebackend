groups:
  - name: hasumane-api-critical
    rules:
      - alert: HasuManeApiDown
        expr: up{job="hasumane-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: HasuMane API is down
          description: Prometheus cannot scrape the HasuMane API target.
      - alert: HasuManeDatabaseDown
        expr: absent(hasumane_api_database_queries_total)
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: HasuMane database telemetry unavailable
          description: Database query metrics are not being emitted by the API.

  - name: hasumane-api-warning
    rules:
      - alert: HasuManeHighErrorRate
        expr: increase(hasumane_api_errors_total[5m]) / clamp_min(increase(hasumane_api_requests_total[5m]), 1) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: HasuMane API high error rate
          description: More than 5% of API requests are returning 5xx responses.
      - alert: HasuManeHighLatency
        expr: hasumane_api_request_duration_average_ms > 750
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: HasuMane API latency is high
          description: Average API request duration is above 750ms.
      - alert: HasuManeLowInventory
        expr: hasumane_api_low_inventory_items > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: HasuMane has low inventory items
          description: One or more inventory items are low or out of stock.

  - name: hasumane-api-resources
    rules:
      - alert: HasuManeHighCpuUsage
        expr: hasumane_api_cpu_usage_percent > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: HasuMane API CPU usage is high
          description: API process CPU usage is above 80%.
      - alert: HasuManeHighMemoryUsage
        expr: hasumane_api_memory_heap_used_bytes / clamp_min(hasumane_api_memory_rss_bytes, 1) > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: HasuMane API memory usage is high
          description: Heap usage is above 80% of resident memory.
