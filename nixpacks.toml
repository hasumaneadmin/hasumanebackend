# Nixpacks configuration for HasuMane backend and frontend proxy
[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "npm run prisma:migrate || echo 'Prisma migration failed; continuing startup'; node scripts/start-production.js"


