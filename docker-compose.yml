services:
  postgres:
    image: postgres:16-alpine
    container_name: hasumane-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=hasumane
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hasumane"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hasumane-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
    name: hasumane_postgres_data
